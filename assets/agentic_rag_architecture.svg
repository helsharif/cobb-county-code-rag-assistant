<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Cobb County Agentic RAG Architecture</title>
  <desc id="desc">A 1920 by 1080 architecture diagram showing user question, Streamlit app, LangChain agent, local document retrieval, web fallback, and grounded answer with sources.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 3; }
      .soft-blue { fill: #eff6ff; stroke: #60a5fa; }
      .soft-green { fill: #ecfdf5; stroke: #34d399; }
      .soft-orange { fill: #fff7ed; stroke: #fb923c; }
      .soft-purple { fill: #f5f3ff; stroke: #a78bfa; }
      .soft-red { fill: #fef2f2; stroke: #f87171; }
      .title { font: 700 54px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 28px Arial, sans-serif; fill: #475569; }
      .label { font: 700 30px Arial, sans-serif; fill: #111827; }
      .small { font: 400 23px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 20px Arial, sans-serif; fill: #475569; }
      .badge { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #334155; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .arrow-muted { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrowhead-muted); stroke-dasharray: 12 10; }
    </style>
    <marker id="arrowhead" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto">
      <path d="M0,0 L16,6 L0,12 Z" fill="#334155"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto">
      <path d="M0,0 L16,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="title" x="96" y="96">Cobb County Building &amp; Fire Code Agentic RAG</text>
  <text class="subtitle" x="98" y="142">Local documents first. Web search only when evidence is weak or current-code verification is needed.</text>

  <rect class="panel" x="78" y="188" width="1764" height="780" rx="34" filter="url(#shadow)"/>

  <g>
    <rect class="box soft-blue" x="132" y="314" width="270" height="170" rx="24"/>
    <rect x="158" y="340" width="52" height="32" rx="16" fill="#2563eb"/>
    <text class="badge" x="178" y="363">1</text>
    <text class="label" x="164" y="414">User Question</text>
    <text class="small" x="164" y="452">Plain-language code,</text>
    <text class="small" x="164" y="482">permit, or fire safety ask</text>
  </g>

  <g>
    <rect class="box soft-purple" x="496" y="314" width="294" height="170" rx="24"/>
    <rect x="522" y="340" width="52" height="32" rx="16" fill="#7c3aed"/>
    <text class="badge" x="542" y="363">2</text>
    <text class="label" x="528" y="414">Streamlit App</text>
    <text class="small" x="528" y="452">Chat UI, source display,</text>
    <text class="small" x="528" y="482">and explainability tab</text>
  </g>

  <g>
    <rect class="box soft-orange" x="884" y="284" width="320" height="230" rx="28"/>
    <rect x="910" y="310" width="52" height="32" rx="16" fill="#ea580c"/>
    <text class="badge" x="930" y="333">3</text>
    <text class="label" x="916" y="382">LangChain Agent</text>
    <text class="small" x="916" y="424">Controls the workflow:</text>
    <text class="small" x="916" y="456">retrieve, judge evidence,</text>
    <text class="small" x="916" y="488">search if needed, answer</text>
  </g>

  <g>
    <rect class="box soft-green" x="1302" y="238" width="360" height="192" rx="24"/>
    <rect x="1328" y="264" width="52" height="32" rx="16" fill="#059669"/>
    <text class="badge" x="1348" y="287">4A</text>
    <text class="label" x="1334" y="340">Local RAG Retrieval</text>
    <text class="small" x="1334" y="378">Chroma searches embedded</text>
    <text class="small" x="1334" y="408">Cobb County PDF chunks</text>
  </g>

  <g>
    <rect class="box soft-red" x="1302" y="558" width="360" height="192" rx="24"/>
    <rect x="1328" y="584" width="52" height="32" rx="16" fill="#dc2626"/>
    <text class="badge" x="1348" y="607">4B</text>
    <text class="label" x="1334" y="660">Web Fallback</text>
    <text class="small" x="1334" y="698">Used for weak evidence or</text>
    <text class="small" x="1334" y="728">current adopted-code checks</text>
  </g>

  <g>
    <path d="M1044 592 L1182 666 L1044 740 L906 666 Z" fill="#fefce8" stroke="#eab308" stroke-width="4"/>
    <text class="label" x="962" y="650">Evidence</text>
    <text class="label" x="974" y="687">Check</text>
    <text class="tiny" x="938" y="724">Relevant enough?</text>
  </g>

  <g>
    <rect class="box soft-blue" x="496" y="656" width="294" height="174" rx="24"/>
    <rect x="522" y="682" width="52" height="32" rx="16" fill="#2563eb"/>
    <text class="badge" x="542" y="705">5</text>
    <text class="label" x="528" y="758">Grounded Answer</text>
    <text class="small" x="528" y="796">2-3 paragraphs with</text>
    <text class="small" x="528" y="826">sources or safe fallback</text>
  </g>

  <g>
    <rect class="box" x="132" y="626" width="270" height="232" rx="24"/>
    <text class="label" x="164" y="682">Guardrails</text>
    <circle cx="174" cy="728" r="7" fill="#2563eb"/>
    <text class="small" x="196" y="736">No unsupported claims</text>
    <circle cx="174" cy="774" r="7" fill="#2563eb"/>
    <text class="small" x="196" y="782">Sources shown</text>
    <circle cx="174" cy="820" r="7" fill="#2563eb"/>
    <text class="small" x="196" y="828">Not legal advice</text>
  </g>

  <path class="arrow" d="M402 399 H496"/>
  <path class="arrow" d="M790 399 H884"/>
  <path class="arrow" d="M1204 370 C1240 350 1264 340 1302 334"/>
  <path class="arrow" d="M1482 430 V534 C1482 546 1468 548 1448 548 H1174"/>
  <path class="arrow" d="M906 666 H790"/>
  <path class="arrow-muted" d="M1182 666 H1302"/>
  <path class="arrow-muted" d="M1302 654 H1182"/>
  <path class="arrow-muted" d="M496 742 H402"/>

  <text class="tiny" x="1222" y="318">Search PDFs first</text>
  <text class="tiny" x="1186" y="636">Weak or current?</text>
  <text class="tiny" x="820" y="642">Synthesize</text>

  <rect x="96" y="994" width="1728" height="52" rx="18" fill="#e2e8f0"/>
  <text class="tiny" x="124" y="1028">Portfolio signal: modular RAG pipeline, local vector search, agentic fallback, source tracking, Dockerized deployment, and conservative answer policy.</text>
</svg>
