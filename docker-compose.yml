services:
  cobb-county-rag:
    build: .
    container_name: cobb-county-rag
    environment:
      ANONYMIZED_TELEMETRY: "false"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPEN_API_KEY: ${OPEN_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-models/text-embedding-004}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-cobb_code_docs_original}
      CHUNK_SIZE: ${CHUNK_SIZE:-3500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-500}
      RETRIEVER_K: ${RETRIEVER_K:-5}
      MIN_RELEVANCE_SCORE: ${MIN_RELEVANCE_SCORE:-0.30}
      DOCLING_ACCELERATOR_DEVICE: ${DOCLING_ACCELERATOR_DEVICE:-auto}
      DOCLING_NUM_THREADS: ${DOCLING_NUM_THREADS:-4}
      DOCLING_DO_OCR: ${DOCLING_DO_OCR:-false}
      DOCLING_BATCH_SIZE: ${DOCLING_BATCH_SIZE:-1}
      DOCLING_MAX_PAGES: ${DOCLING_MAX_PAGES:-250}
      DOCLING_PAGE_CHUNK_SIZE: ${DOCLING_PAGE_CHUNK_SIZE:-30}
      DOCLING_PAGE_OVERLAP: ${DOCLING_PAGE_OVERLAP:-5}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-cobb-county-rag}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      CHROMA_API_KEY: ${CHROMA_API_KEY:-}
    ports:
      - "${STREAMLIT_HOST_PORT:-8502}:8501"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    restart: unless-stopped
